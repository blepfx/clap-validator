name: Test Validate

on:
  push:
  pull_request:
    branches:
      - master

defaults:
  run:
    shell: bash

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: Check on ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Run clippy
        run: cargo clippy --all -- -D warnings

      - name: Run format check
        run: cargo fmt --all -- --check
        
      - name: Run tests
        run: cargo test --all -- --test-threads 1